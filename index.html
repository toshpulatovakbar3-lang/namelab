<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NameLab — генератор никнеймов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
            color: #1e293b;
            transition: background 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .title-section p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .theme-switch {
            background: #e2e8f0;
            border-radius: 40px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }

        body.dark .theme-switch {
            background: #334155;
        }

        .theme-option {
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 32px;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #475569;
        }

        body.dark .theme-option {
            color: #cbd5e1;
        }

        .theme-option.active {
            background: #f97316;
            color: white;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        body.dark .category-card {
            background: rgba(30, 41, 59, 0.9);
        }

        .category-title {
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f97316;
            margin-bottom: 16px;
        }

        .categories-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .cat-btn {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.dark .cat-btn {
            background: #1e293b;
            border-color: #475569;
            color: #cbd5e1;
        }

        .cat-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .cat-emoji {
            font-size: 1.4rem;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.1); }
        }

        .names-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        body.dark .names-card {
            background: rgba(30, 41, 59, 0.9);
        }

        .names-header {
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #10b981;
            margin-bottom: 16px;
        }

        .category-big-emoji {
            text-align: center;
            font-size: 4rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .names-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .name-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border: 1px solid #e2e8f0;
        }

        body.dark .name-item {
            background: rgba(15, 23, 42, 0.8);
            border-color: #334155;
        }

        .name-text {
            font-size: 1rem;
            font-weight: 500;
        }

        .copy-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #3b82f6;
            font-weight: 500;
            transition: transform 0.1s;
        }

        body.dark .copy-btn {
            background: #334155;
            color: #60a5fa;
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .generate-btn {
            background: linear-gradient(135deg, #f97316, #eab308);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title-section">
            <h1>🧪 NameLab</h1>
            <p>Генератор никнеймов с характером</p>
        </div>
        <div class="theme-switch">
            <button data-theme="light" class="theme-option active">☀️</button>
            <button data-theme="dark" class="theme-option">🌙</button>
        </div>
    </div>

    <div class="category-card">
        <div class="category-title">🎭 ВЫБЕРИ КАТЕГОРИЮ</div>
        <div class="categories-grid" id="categoriesGrid">
            <button data-cat="fantasy" class="cat-btn active"><span class="cat-emoji">🧙</span> Фэнтези</button>
            <button data-cat="cyberpunk" class="cat-btn"><span class="cat-emoji">🤖</span> Киберпанк</button>
            <button data-cat="gaming" class="cat-btn"><span class="cat-emoji">🎮</span> Игровые</button>
            <button data-cat="mythical" class="cat-btn"><span class="cat-emoji">🐉</span> Мифические</button>
        </div>
    </div>

    <div class="names-card">
        <div class="names-header">✨ НИКНЕЙМЫ</div>
        <div class="category-big-emoji" id="bigEmoji">🧙</div>
        <div class="names-list" id="namesList"></div>
        <button id="generateBtn" class="generate-btn">🔄 Сгенерировать</button>
    </div>

    <div class="footer">
        🔥 Нажми на никнейм — скопируй
    </div>
</div>

<script>
    const nicknamesDB = {
        fantasy: ["ShadowBlade", "MoonWhisper", "ElvenKing", "DragonSoul", "FrostMage", "StarWalker", "NightShade", "SilverFox", "StormBringer", "WildHeart"],
        cyberpunk: ["NeonGhost", "ZeroCool", "RazorWire", "CyberPunk2077", "DataViper", "GlitchMode", "SynthWave", "PhantomByte", "CryptoLord", "PixelKiller"],
        gaming: ["NoobSlayer", "HeadshotKing", "RageQuit", "EpicGamer", "LagKiller", "SniperElite", "XPBooster", "ClutchMaster", "FragOut", "GG_WP"],
        mythical: ["PhoenixRise", "ThunderGod", "SirenSong", "Behemoth", "HydraVenom", "Odin'sEye", "LunarWolf", "EternalSoul", "MysticHaze", "CelestialOne"]
    };

    const categoryEmojis = {
        fantasy: "🧙",
        cyberpunk: "🤖",
        gaming: "🎮",
        mythical: "🐉"
    };

    let currentCat = "fantasy";
    let currentTheme = localStorage.getItem('namelab_theme') || 'light';

    function setTheme(theme) {
        currentTheme = theme;
        if (theme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
        localStorage.setItem('namelab_theme', theme);
        document.querySelectorAll('.theme-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === theme);
        });
    }

    function updateBigEmoji(category) {
        const emoji = categoryEmojis[category];
        const bigEmojiDiv = document.getElementById('bigEmoji');
        if (bigEmojiDiv) {
            bigEmojiDiv.textContent = emoji;
            bigEmojiDiv.style.animation = 'none';
            setTimeout(() => {
                bigEmojiDiv.style.animation = 'float 3s ease-in-out infinite';
            }, 10);
        }
    }

    function renderNicknames() {
        const nicknames = nicknamesDB[currentCat];
        const shuffled = [...nicknames].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, 8);
        
        const html = selected.map(nick => `
            <div class="name-item">
                <span class="name-text">${escapeHtml(nick)}</span>
                <button class="copy-btn" data-name="${escapeHtml(nick)}">📋 Копировать</button>
            </div>
        `).join('');
        
        document.getElementById('namesList').innerHTML = html;
        
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const nick = btn.dataset.name;
                navigator.clipboard.writeText(nick);
                const original = btn.textContent;
                btn.textContent = '✅ Готово';
                setTimeout(() => btn.textContent = original, 1000);
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = btn.dataset.cat;
            updateBigEmoji(currentCat);
            renderNicknames();
        });
    });

    document.getElementById('generateBtn').addEventListener('click', () => {
        renderNicknames();
    });

    document.querySelectorAll('.theme-option').forEach(btn => {
        btn.addEventListener('click', () => setTheme(btn.dataset.theme));
    });

    setTheme(currentTheme);
    updateBigEmoji('fantasy');
    renderNicknames();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
